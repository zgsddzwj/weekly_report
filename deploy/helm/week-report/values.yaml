replicaCount:
  api: 1
  web: 1

image:
  api:
    repository: week-report-api
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: week-report-web
    tag: latest
    pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: week-report.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

postgresql:
  enabled: true
  image: postgres:16-alpine
  user: weekreport
  password: weekreport
  database: weekreport
  storage: 10Gi

redis:
  enabled: true
  image: redis:7-alpine
  storage: 5Gi

api:
  secretKey: change-me-in-production-use-openssl-rand-hex-32
  encryptionKey: ""
  corsOrigins: "https://week-report.local"
  featureLlm: "false"
  featureExternalTelemetry: "false"
  allowPublicOauth: "true"
  resources: {}

worker:
  resources: {}

beat:
  resources: {}

web:
  resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
