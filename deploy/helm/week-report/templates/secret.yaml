apiVersion: v1
kind: Secret
metadata:
  name: {{ include "week-report.fullname" . }}
  labels:
    {{- include "week-report.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.api.secretKey | quote }}
  ENCRYPTION_KEY: {{ .Values.api.encryptionKey | quote }}
  DATABASE_URL: "postgresql+psycopg://{{ .Values.postgresql.user }}:{{ .Values.postgresql.password }}@{{ include "week-report.fullname" . }}-postgres:5432/{{ .Values.postgresql.database }}"
  REDIS_URL: "redis://{{ include "week-report.fullname" . }}-redis:6379/0"
  CORS_ORIGINS: {{ .Values.api.corsOrigins | quote }}
  FEATURE_LLM: {{ .Values.api.featureLlm | quote }}
  FEATURE_EXTERNAL_TELEMETRY: {{ .Values.api.featureExternalTelemetry | quote }}
  ALLOW_PUBLIC_OAUTH: {{ .Values.api.allowPublicOauth | quote }}
